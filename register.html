<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — Norwegian Shares</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<div class="auth-page">

  <div class="auth-left">
    <div class="auth-overlay"></div>

    <div class="auth-content">
      <h1>
        Start Investing with
        <span>Norwegian Shares</span>
      </h1>

      <p>
        Create your investor account and begin building your portfolio today.
      </p>
    </div>
  </div>

  <div class="auth-right">

    <form class="auth-form" id="register-form">

      <h2>Create Account</h2>

      <div class="form-group">
        <label>Email Address</label>

        <input
          type="email"
          id="email"
          placeholder="Enter your email"
          required
        />
      </div>

      <div class="form-group">
        <label>Password</label>

        <input
          type="password"
          id="password"
          placeholder="Create password"
          required
        />
      </div>

      <button type="submit" class="btn-submit" id="submit">
        Create Account
      </button>

      <p id="message"></p>

      <div class="auth-switch">
        Already have an account?
        <a href="login.html">Login</a>
      </div>

    </form>

  </div>

</div>

<script type="module" src="js/register.js"></script>

</body>
</html>
