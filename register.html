<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Norwegian Shares — Register</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="auth-page">

  <div class="auth-left">
    <div class="auth-overlay"></div>

    <div class="auth-content">
      <div class="hero-eyebrow">Create Investor Account</div>

      <h1>
        Start your<br>
        <span>investment</span>
        journey
      </h1>

      <p>
        Buy shares, track portfolio growth, and access your dashboard anytime.
      </p>
    </div>
  </div>

  <div class="auth-right">

    <form class="auth-form" id="registerForm">

      <h2>Create Account</h2>

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="John Doe" required>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Minimum 8 characters" required>
      </div>

      <button type="submit" class="btn-submit">
        Create Account
      </button>

      <div class="auth-switch">
        Already have an account?
        <a href="login.html">Sign In</a>
      </div>

      <div id="message"></div>

    </form>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
  getAuth,
  createUserWithEmailAndPassword,
  updateProfile
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_STORAGE_BUCKET",
  messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const registerForm = document.getElementById('registerForm');
const message = document.getElementById('message');

registerForm.addEventListener('submit', async (e) => {
  e.preventDefault();

  const name = document.getElementById('name').value;
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  try {

    const userCredential = await createUserWithEmailAndPassword(
      auth,
      email,
      password
    );

    await updateProfile(userCredential.user, {
      displayName: name
    });

    message.innerHTML = 'Account created successfully!';
    message.className = 'success-message';

    setTimeout(() => {
      window.location.href = 'dashboard.html';
    }, 1500);

  } catch (error) {

    message.innerHTML = error.message;
    message.className = 'error-message';
  }
});

</script>

</body>
</html>
