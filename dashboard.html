<!DOCTYPE html>
<html>
<head>
  <title>Marketplace</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav>
  <div class="logo">Norwegian Shares</div>
</nav>

<div class="container" style="padding-top:40px;">

  <h1>Share Marketplace</h1>

  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:30px;">

    <div class="card">
      <h2>NOR-A</h2>
      <p>Norwegian Growth A</p>
      <h3>NOK 245</h3>
      <button class="btn-primary">Buy Shares</button>
    </div>

    <div class="card">
      <h2>NOR-B</h2>
      <p>Norwegian Growth B</p>
      <h3>NOK 180</h3>
      <button class="btn-primary">Buy Shares</button>
    </div>

    <div class="card">
      <h2>NOR-C</h2>
      <p>Norwegian Growth C</p>
      <h3>NOK 310</h3>
      <button class="btn-primary">Buy Shares</button>
    </div>

  </div>

</div>

</body>
</html>
