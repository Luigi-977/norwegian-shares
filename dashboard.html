<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Dashboard</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<section class="section-dashboard">

  <div class="container">

    <div class="dashboard-header">
      <div class="section-label">
        Investor Dashboard
      </div>

      <h2 class="section-title light">
        Welcome to Norwegian Shares
      </h2>
    </div>

    <div class="dashboard-grid">

      <div class="dashboard-card">
        <div class="dashboard-card-title">
          Portfolio Balance
        </div>

        <div class="dashboard-big">
          NOK 845,000
        </div>
      </div>

      <div class="dashboard-card">
        <div class="dashboard-card-title">
          Active Shares
        </div>

        <div class="dashboard-big">
          425
        </div>
      </div>

      <div class="dashboard-card">
        <div class="dashboard-card-title">
          Annual Return
        </div>

        <div class="dashboard-big">
          18.7%
        </div>
      </div>

    </div>

  </div>

</section>

</body>
</html>
